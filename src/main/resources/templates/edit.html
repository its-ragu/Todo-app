<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Task</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="todo-container">
    <h4><i class="bi bi-pencil-square"></i> Edit Task</h4>
    <form class="d-flex mb-4 mt-4" th:action="@{/edit/{id}(id=${todo.id})}" method="post">
        <input type="text" name="title" th:value="${todo.title}" class="form-control todo-input" required>
        <button class="btn btn-add">SAVE <span>✓</span></button>
    </form>
    <a th:href="@{/}" class="text-muted small">← Back to list</a>
</div>
</body>
</html>
